<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>DontDelay — 메모 저장</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        padding: 24px;
        max-width: 640px;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 13px;
        color: #1f2937;
        background: #fafafa;
      }
      h1 {
        margin: 0 0 4px;
        font-size: 20px;
        color: #6d28d9;
      }
      p.sub {
        margin: 0 0 20px;
        color: #6b7280;
        font-size: 12px;
      }
      .field { margin-bottom: 14px; }
      .label {
        font-weight: 600;
        font-size: 11px;
        color: #6b7280;
        margin-bottom: 4px;
      }
      .value {
        padding: 8px 10px;
        background: white;
        border: 1px solid #e5e7eb;
        border-radius: 6px;
        font-size: 12px;
        word-break: break-all;
      }
      textarea {
        width: 100%;
        min-height: 120px;
        padding: 12px;
        border: 1px solid #d1d5db;
        border-radius: 8px;
        font-size: 13px;
        resize: vertical;
      }
      .actions {
        display: flex;
        gap: 8px;
        margin-top: 16px;
      }
      button {
        padding: 10px 18px;
        border: none;
        border-radius: 8px;
        font-weight: 600;
        cursor: pointer;
      }
      #saveBtn { background: #6d28d9; color: white; }
      #cancelBtn { background: #e5e7eb; color: #374151; }
      #status {
        margin-top: 12px;
        padding: 10px;
        border-radius: 8px;
        font-size: 12px;
        display: none;
      }
      #status.ok { display: block; background: #ecfdf5; color: #047857; }
      #status.err { display: block; background: #fef2f2; color: #b91c1c; }
    </style>
  </head>
  <body>
    <h1>메모와 함께 저장</h1>
    <p class="sub">메모를 입력한 뒤 저장하세요.</p>

    <div class="field">
      <div class="label">제목</div>
      <div id="title" class="value"></div>
    </div>
    <div class="field">
      <div class="label">URL</div>
      <div id="url" class="value"></div>
    </div>
    <div class="field">
      <div class="label">메모</div>
      <textarea id="memo" placeholder="나중에 볼 때 참고할 메모"></textarea>
    </div>

    <div class="actions">
      <button id="saveBtn" type="button">저장</button>
      <button id="cancelBtn" type="button">닫기</button>
    </div>
    <div id="status"></div>

    <script src="../save_api.js"></script>
    <script src="save_dialog.js"></script>
  </body>
</html>
