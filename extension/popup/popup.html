<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>DontDelay URL Saver</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        width: 320px;
        margin: 0;
        padding: 16px;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 13px;
        color: #1f2937;
      }
      h1 {
        font-size: 16px;
        margin: 0 0 4px;
        color: #6d28d9;
      }
      p.sub {
        margin: 0 0 16px;
        color: #6b7280;
        font-size: 12px;
      }
      label {
        display: block;
        font-weight: 600;
        margin-bottom: 4px;
        font-size: 12px;
      }
      input {
        width: 100%;
        padding: 8px 10px;
        border: 1px solid #d1d5db;
        border-radius: 6px;
        margin-bottom: 12px;
        font-size: 12px;
      }
      .row {
        display: flex;
        gap: 8px;
      }
      button {
        flex: 1;
        padding: 10px;
        border: none;
        border-radius: 8px;
        font-weight: 600;
        cursor: pointer;
        font-size: 12px;
      }
      #saveBtn {
        background: #6d28d9;
        color: white;
      }
      #testBtn {
        background: #f3f4f6;
        color: #374151;
      }
      #status {
        margin-top: 12px;
        padding: 10px;
        border-radius: 8px;
        font-size: 12px;
        display: none;
      }
      #status.ok {
        display: block;
        background: #ecfdf5;
        color: #047857;
      }
      #status.err {
        display: block;
        background: #fef2f2;
        color: #b91c1c;
      }
      #lastSaved {
        margin-top: 12px;
        padding: 10px;
        background: #f5f3ff;
        border-radius: 8px;
        font-size: 11px;
        color: #4b5563;
        display: none;
      }
    </style>
  </head>
  <body>
    <h1>DontDelay URL Saver</h1>
    <p class="sub">DontDelay 앱 → URL 보관함 → 브라우저 연동에서 포트·토큰을 복사하세요.</p>

    <label for="port">포트</label>
    <input id="port" type="number" value="17823" min="1" max="65535" />

    <label for="token">토큰</label>
    <input id="token" type="password" placeholder="Bearer 토큰" />

    <div class="row">
      <button id="testBtn" type="button">연결 테스트</button>
      <button id="saveBtn" type="button">현재 탭 저장</button>
    </div>

    <div id="status"></div>
    <div id="lastSaved"></div>

    <script src="popup.js"></script>
  </body>
</html>
